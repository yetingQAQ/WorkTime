name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync
        uv pip install pyinstaller

    - name: Build Safe Version
      run: |
        python build.py --mode safe

    - name: Build Aggressive Version
      run: |
        python build.py --mode aggressive

    - name: Prepare release assets
      run: |
        mkdir release
        copy "dist\工作时间进度.exe" "release\WorkTime-Safe.exe"
        copy "dist_aggressive\工作时间进度.exe" "release\WorkTime-Aggressive.exe"
      shell: cmd

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release/WorkTime-Safe.exe
          release/WorkTime-Aggressive.exe
        body: |
          ## 工作时间进度条 ${{ github.ref_name }}

          ### 下载说明

          - **WorkTime-Safe.exe** - 兼容性好，稳定性高，适合大多数场景（推荐）
          - **WorkTime-Aggressive.exe** - 体积较小，兼容性稍差（体积优先）

          ### 使用方法

          1. 下载其中一个版本
          2. 运行程序
          3. 首次运行会生成 `config.json` 配置文件
          4. 可通过系统托盘图标打开设置界面

          ### 功能特点

          - ✅ 在屏幕最顶部显示渐变色进度条
          - ✅ 根据上班时间和下班时间自动计算工作进度
          - ✅ 到达下班时间时自动提示关机
          - ✅ 可自定义进度条渐变色和流光速度
          - ✅ 支持最小化到系统托盘
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
